<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGPD Marketing Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efeb;color:#1c1c1a;font-size:15px;line-height:1.5;min-height:100vh}
input,textarea,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer}

/* Header */
.header{background:#1c1c1a;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.header-logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;white-space:nowrap}
.header-logo span{opacity:.6;font-weight:400}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.user-badge.staff{background:#2d4a20;color:#7dc954}
.user-badge.marketing{background:#1a3352;color:#5ba3f5}
.user-badge.admin{background:#3d1f5e;color:#b57fe8}
.btn-signout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px}
.btn-signout:hover{background:rgba(255,255,255,.18)}

/* Nav */
.nav{background:#fff;border-bottom:1px solid #e5e3dc;padding:0 16px;display:flex;align-items:center;gap:0;flex-wrap:wrap}
.nav-btn{padding:10px 13px;font-size:13px;font-weight:500;color:#6b6966;background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;margin-bottom:-1px;transition:all .15s}
.nav-btn:hover{color:#1c1c1a}
.nav-btn.active{color:#1c1c1a;border-bottom-color:#1c1c1a;font-weight:600}
.nav-btn.accent{color:#2563eb;font-weight:600}
.nav-btn.accent:hover{color:#1d4ed8}

/* Layout */
.page{max-width:1060px;margin:0 auto;padding:24px 16px}
@media(max-width:600px){.page{padding:16px 12px}}

/* Cards */
.card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:20px}
.card-sm{padding:14px 16px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:#3a3835;margin-bottom:5px}
.req{color:#dc2626;margin-left:2px}
.opt{font-size:11px;font-weight:400;color:#aaa9a2;margin-left:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid #d9d7d0;border-radius:8px;background:#fff;color:#1c1c1a;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field textarea{resize:vertical;min-height:72px}
.field .hint{font-size:11px;color:#9a9893;margin-top:3px}
.field-error input,.field-error select,.field-error textarea{border-color:#dc2626}
.field-error .err{display:block!important}
.err{display:none;font-size:11px;color:#dc2626;margin-top:3px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;border:1.5px solid #d9d7d0;background:#fff;color:#1c1c1a;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{background:#f5f4f0;border-color:#bbb9b2}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1c1c1a;border-color:#1c1c1a;color:#fff}
.btn-primary:hover{background:#333;border-color:#333}
.btn-blue{background:#2563eb;border-color:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8;border-color:#1d4ed8}
.btn-green{background:#16a34a;border-color:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.btn-red{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.btn-red:hover{background:#fecaca}
.btn-yellow{background:#fef9c3;border-color:#fde047;color:#854d0e}
.btn-yellow:hover{background:#fef08a}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-block{width:100%;justify-content:center}
.btn-loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-left:4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-new{background:#dbeafe;color:#1d4ed8}
.badge-reviewing{background:#fef9c3;color:#854d0e}
.badge-active{background:#dcfce7;color:#15803d}
.badge-done{background:#f3f4f6;color:#4b5563}
.badge-staff{background:#dcfce7;color:#15803d}
.badge-marketing{background:#dbeafe;color:#1d4ed8}
.badge-admin{background:#f3e8ff;color:#7c3aed}
.badge-high{background:#fee2e2;color:#dc2626}
.badge-medium{background:#fef9c3;color:#854d0e}
.badge-low{background:#dcfce7;color:#15803d}

/* Stats */
.stat{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:16px 18px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b6966;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;line-height:1}

/* Request cards */
.req-card{background:#fff;border:1.5px solid #e5e3dc;border-radius:11px;padding:16px 18px;cursor:pointer;transition:all .12s;margin-bottom:10px}
.req-card:hover{border-color:#2563eb;box-shadow:0 2px 12px rgba(37,99,235,.1);transform:translateY(-1px)}
.req-card.clarification{border-left:4px solid #f59e0b}
.req-card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.req-card-meta{font-size:12px;color:#6b6966;display:flex;flex-wrap:wrap;gap:8px}
.req-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f0efeb;flex-wrap:wrap;gap:6px}

/* Priority bar */
.pri-bar{height:4px;background:#e5e3dc;border-radius:2px;margin-top:8px;overflow:hidden}
.pri-fill{height:100%;border-radius:2px}

/* Alert */
.alert{border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.alert-warn{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.alert-info{background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.alert-success{background:#dcfce7;border:1px solid #86efac;color:#15803d}
.alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6b6966;text-align:left;background:#f8f7f4;border-bottom:1px solid #e5e3dc;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #f5f4f0;vertical-align:middle}
.tbl tr:hover td{background:#fafaf8}
.tbl tr:last-child td{border-bottom:none}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:580px;box-shadow:0 8px 40px rgba(0,0,0,.2);margin:auto}
.modal-header{padding:18px 22px;border-bottom:1px solid #e5e3dc;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;color:#6b6966;cursor:pointer;padding:2px 5px;line-height:1}
.modal-close:hover{color:#1c1c1a}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid #e5e3dc;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.modal-footer-split{justify-content:space-between}

/* Toast */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1c1c1a;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:fadeUp .2s ease;max-width:300px}
.toast.ok{background:#15803d}
.toast.err{background:#dc2626}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Steps */
.steps{display:flex;align-items:center;margin-bottom:24px;gap:0;overflow-x:auto}
.step{display:flex;align-items:center;gap:7px;flex-shrink:0}
.step-num{width:26px;height:26px;border-radius:50%;border:2px solid #d9d7d0;background:#fff;color:#9a9893;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-label{font-size:12px;color:#9a9893;white-space:nowrap}
.step.active .step-num{background:#1c1c1a;border-color:#1c1c1a;color:#fff}
.step.active .step-label{color:#1c1c1a;font-weight:600}
.step.done .step-num{background:#15803d;border-color:#15803d;color:#fff;font-size:10px}
.step.done .step-label{color:#15803d}
.step-line{width:28px;height:2px;background:#d9d7d0;flex-shrink:0}
.step-line.done{background:#15803d}

/* Channels */
.channel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
@media(max-width:480px){.channel-grid{grid-template-columns:repeat(2,1fr)}}
.chip{border:1.5px solid #d9d7d0;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:13px;color:#3a3835;display:flex;align-items:center;gap:6px;transition:all .12s;user-select:none}
.chip:hover{border-color:#2563eb;background:#eff6ff}
.chip.on{border-color:#15803d;background:#f0fdf4;color:#15803d;font-weight:500}

/* Goals */
.goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:480px){.goal-grid{grid-template-columns:1fr 1fr}}
.goal-card{border:1.5px solid #d9d7d0;border-radius:9px;padding:11px 13px;cursor:pointer;transition:all .12s}
.goal-card:hover{border-color:#2563eb;background:#eff6ff}
.goal-card.on{border-color:#2563eb;background:#eff6ff}
.goal-name{font-size:13px;font-weight:600;color:#1c1c1a;margin-bottom:2px}
.goal-desc{font-size:11px;color:#6b6966}
.goal-card.on .goal-name{color:#1d4ed8}

/* Priority pills */
.pri-pills{display:flex;gap:4px}
.pri-pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1.5px solid #d9d7d0;background:#fff;color:#6b6966;cursor:pointer;transition:all .12s}
.pri-pill:hover{border-color:#2563eb;color:#2563eb}
.pri-pill.on{background:#1c1c1a;border-color:#1c1c1a;color:#fff}

/* Confirm screen */
.confirm{text-align:center;padding:40px 20px;max-width:460px;margin:0 auto}
.confirm-icon{font-size:52px;margin-bottom:16px;animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#15803d}
.confirm-desc{font-size:15px;color:#6b6966;margin-bottom:20px;line-height:1.6}
.confirm-box{background:#f8f7f4;border-radius:10px;padding:14px 16px;text-align:left;margin-bottom:20px}
.confirm-box-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b6966;margin-bottom:8px}
.confirm-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;margin-bottom:5px}

/* Detail tabs */
.tabs{display:flex;border-bottom:1px solid #e5e3dc;margin-bottom:16px;overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:#6b6966;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer}
.tab-btn:hover{color:#1c1c1a}
.tab-btn.active{color:#1c1c1a;border-bottom-color:#1c1c1a;font-weight:600}

/* Comment */
.comment{display:flex;gap:10px;margin-bottom:12px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.av-staff{background:#15803d}
.av-marketing{background:#1d4ed8}
.av-admin{background:#7c3aed}
.comment-bub{flex:1;background:#f5f4f0;border-radius:0 10px 10px 10px;padding:10px 12px}
.comment-bub.internal{background:#fef9c3;border:1px dashed #fde047}
.comment-meta{font-size:11px;color:#6b6966;margin-bottom:3px;display:flex;gap:8px;flex-wrap:wrap}
.comment-body{font-size:13px}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
@media(max-width:800px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kanban{grid-template-columns:1fr}}
.k-col{background:#f5f4f0;border-radius:10px;padding:12px}
.k-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.k-col-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b6966}
.k-count{font-size:11px;background:#fff;border-radius:20px;padding:1px 8px;color:#6b6966;border:1px solid #e5e3dc}
.k-card{background:#fff;border:1.5px solid #e5e3dc;border-radius:9px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.k-card:hover{border-color:#2563eb;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.k-card-title{font-size:13px;font-weight:600;margin-bottom:4px}
.k-card-meta{font-size:11px;color:#6b6966;margin-bottom:6px}

/* Section head */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sec-title{font-size:20px;font-weight:700}
.sec-sub{font-size:13px;color:#6b6966;margin-top:2px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-bar input{padding:8px 12px;border:1.5px solid #d9d7d0;border-radius:7px;font-size:13px;outline:none;min-width:180px;flex:1;max-width:280px}
.filter-bar input:focus{border-color:#2563eb}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid #d9d7d0;background:#fff;color:#6b6966;cursor:pointer}
.pill:hover{border-color:#2563eb;color:#2563eb}
.pill.on{background:#1c1c1a;border-color:#1c1c1a;color:#fff}

/* Deliverable */
.deliv{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:7px;background:#f5f4f0;margin-bottom:6px}
.deliv.done-deliv{background:#f0fdf4}
.deliv input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#15803d}
.deliv-label{flex:1;font-size:13px}
.deliv-label.crossed{text-decoration:line-through;color:#9a9893}

/* Timeline */
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:14px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#d9d7d0;flex-shrink:0;margin-top:3px}
.tl-dot.current{background:#2563eb}
.tl-line{position:absolute;left:4px;top:13px;bottom:0;width:2px;background:#e5e3dc}
.tl-action{font-size:13px;font-weight:600}
.tl-meta{font-size:11px;color:#6b6966}

/* Empty */
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:42px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-desc{font-size:14px;color:#6b6966;max-width:320px;margin:0 auto 20px}

/* Bulk bar */
.bulk-bar{background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bulk-count{font-size:13px;font-weight:700;color:#1d4ed8}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:#6b6966}
.spinner{width:20px;height:20px;border:2px solid #e5e3dc;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite}

/* Sections label */
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b6966;margin-bottom:10px}

/* Page top back btn */
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#6b6966;background:none;border:none;cursor:pointer;padding:0;margin-bottom:14px;font-weight:500}
.back-btn:hover{color:#1c1c1a}

/* Scrollable table wrapper */
.tbl-wrap{overflow-x:auto;border-radius:11px;border:1px solid #e5e3dc}
.tbl-wrap table{border-radius:11px;overflow:hidden}
</style>
</head>

// ─── HELPERS ────────────────────────────────────────────────
function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(d){if(!d)return'';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}

function score(f){
  let s=0
  const pu={low:5,medium:15,high:30},pi={low:5,medium:15,high:25},pr={low:3,medium:8,high:15}
  if(f.urgency_level)s+=pu[f.urgency_level]||0
  if(f.impact_level)s+=pi[f.impact_level]||0
  if(f.reach_level)s+=pr[f.reach_level]||0
  const d=days(f.registration_deadline)
  if(d!==null){if(d<7)s+=20;else if(d<14)s+=12;else if(d<21)s+=6}
  if(f.marketing_goal==='Financial sustainability'||f.marketing_goal==='Grow participation')s+=10
  return Math.min(s,100)
}
function scoreColor(s){return s>=70?'#dc2626':s>=40?'#d97706':'#15803d'}
function toast(msg,type='ok'){
  const el=document.createElement('div')
  el.className='toast '+(type==='err'?'err':type==='warn'?'':type)
  el.textContent=msg
  q('toasts').appendChild(el)
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},3000)
}
function setLoading(id,on){
  const btn=q(id)
  if(!btn)return
  if(on){btn.classList.add('btn-loading');btn.disabled=true}
  else{btn.classList.remove('btn-loading');btn.disabled=false}
}
function isMkt(){return USER?.role==='marketing'||USER?.role==='admin'}
function isAdmin(){return USER?.role==='admin'}
function blankForm(){
  return{program_name:'',program_type:'',start_date:'',end_date:'',program_time:'',
    location:'',registration_deadline:'',enrollment_goal:'',season:'',department:'',
    marketing_goal:'',urgency_level:'',impact_level:'',reach_level:'',
    target_who:'',key_message:'',highlights:'',channels:[],
    photos_supplied:false,photos_by_marketing:false,video_needed:false,graphics_new:false,notes:''}
}
function getReq(id){return ALL_REQS.find(r=>r.id===id)}

// ─── AUTH ────────────────────────────────────────────────────
async function boot(){
  const {data:{session}} = await SB.auth.getSession()
  if(session) await loadUser(session.user.id)
  else showLogin()
  SB.auth.onAuthStateChange(async(_,s)=>{
    if(s && s.user){
      await loadUser(s.user.id)
    } else {
      USER=null
      ALL_REQS=[]
      showLogin()
    }
  })
}
async function loadUser(authId){
  const {data} = await SB.from('mkt_users').select('*').eq('auth_user_id',authId).single()
  USER = data
  if(!USER){showNoAccess();return}
  SB.from('mkt_users').update({last_seen_at:new Date().toISOString()}).eq('id',USER.id)
  await loadReqs()
  showApp()
}
async function doLogin(){
  const email = q('li-email')?.value?.trim()
  const pass = q('li-pass')?.value
  if(!email||!pass){showLoginErr('Enter your email and password');return}
  const btn = q('li-btn')
  if(btn){ btn.textContent='Signing in…'; btn.disabled=true }
  const errEl = q('li-err')
  if(errEl) errEl.style.display='none'
  const {error} = await SB.auth.signInWithPassword({email,password:pass})
  if(error){
    if(btn){ btn.textContent='Sign in →'; btn.disabled=false }
    showLoginErr(error.message)
  }
  // On success, onAuthStateChange fires automatically and calls loadUser → showApp
}
function showLoginErr(msg){
  const el=q('li-err')
  if(el){el.textContent=msg;el.style.display='flex'}
}
async function doSignOut(){
  USER=null
  ALL_REQS=[]
  VIEW='requests'
  try{ await SB.auth.signOut() }catch(e){ showLogin() }
  // onAuthStateChange will fire and call showLogin() automatically
}

// ─── DATA ────────────────────────────────────────────────────
async function loadReqs(){
  let q2=SB.from('marketing_requests').select('*').order('created_at',{ascending:false})
  if(USER.role==='staff') q2=q2.eq('submitted_by_id',USER.id).eq('is_archived',false)
  const {data,error} = await q2
  if(error){toast('Error loading requests','err');return}
  ALL_REQS = data||[]
}
async function loadAllReqs(){
  const {data,error} = await SB.from('marketing_requests').select('*').order('created_at',{ascending:false})
  if(error){toast('Error loading','err');return}
  ALL_REQS = data||[]
}
async function loadDetail(id){
  const [c,d,h] = await Promise.all([
    SB.from('mkt_comments').select('*').eq('request_id',id).order('created_at',{ascending:true}),
    SB.from('mkt_deliverables').select('*').eq('request_id',id).order('sort_order',{ascending:true}),
    SB.from('mkt_status_history').select('*').eq('request_id',id).order('created_at',{ascending:true}),
  ])
  COMMENTS=c.data||[]; DELIVS=d.data||[]; HISTORY=h.data||[]
}
async function loadUsers(){
  const {data} = await SB.from('mkt_users').select('*').order('full_name')
  USERS_LIST = data||[]
}

async function submitRequest(){
  if(!FORM)return
  const f=FORM
  // Build clean payload — only columns that exist
  const payload={
    program_name:f.program_name.trim(),
    program_type:f.program_type||null,
    start_date:f.start_date||null,
    end_date:f.end_date||null,
    program_time:f.program_time||null,
    location:f.location||null,
    registration_deadline:f.registration_deadline||null,
    enrollment_goal:f.enrollment_goal?parseInt(f.enrollment_goal):null,
    season:f.season||null,
    department:f.department||USER?.department||null,
    marketing_goal:f.marketing_goal||null,
    urgency_level:f.urgency_level||null,
    impact_level:f.impact_level||null,
    reach_level:f.reach_level||null,
    target_who:f.target_who||null,
    key_message:f.key_message||null,
    highlights:f.highlights?f.highlights.split('\n').map(s=>s.trim()).filter(Boolean):[],
    channels:Array.isArray(f.channels)?f.channels:[],
    photos_supplied:!!f.photos_supplied,
    photos_by_marketing:!!f.photos_by_marketing,
    video_needed:!!f.video_needed,
    graphics_new:!!f.graphics_new,
    notes:f.notes||null,
    priority_score:score(f),
    status:'new',
    submitted_by_id:USER.id,
    staff_name:USER.full_name,
    is_archived:false,
    clarification_needed:false,
  }

  setLoading('submit-btn',true)
  const {data,error} = await SB.from('marketing_requests').insert([payload]).select().single()
  setLoading('submit-btn',false)

  if(error){
    toast('Error submitting: '+error.message,'err')
    const errEl=q('form-err')
    if(errEl){errEl.textContent='Error: '+error.message;errEl.style.display='block'}
    return
  }

  // History + notification (non-blocking)
  SB.from('mkt_status_history').insert([{request_id:data.id,changed_by_name:USER.full_name,changed_by_role:USER.role,new_status:'new',note:'Submitted'}])
  SB.from('mkt_notifications').insert([{request_id:data.id,recipient_id:USER.id,type:'submitted',message:'Your request "'+data.program_name+'" was submitted',read:false}])

  LAST_SUBMITTED = data
  FORM = null; FORM_STEP = 1
  await loadReqs()
  VIEW='submitted'; showApp()
}

async function changeStatus(id,newStatus,note=''){
  const req=getReq(id)
  const extra={}
  if(newStatus==='done') extra.completed_at=new Date().toISOString()
  if(newStatus==='active'){extra.approved_at=new Date().toISOString();extra.approved_by=USER.full_name}
  const {error}=await SB.from('marketing_requests').update({status:newStatus,...extra}).eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:USER.role,old_status:req?.status,new_status:newStatus,note:note||'Status updated'}])
  if(req?.submitted_by_id && req.submitted_by_id!==USER.id){
    SB.from('mkt_notifications').insert([{request_id:id,recipient_id:req.submitted_by_id,type:'status_change',message:'"'+req.program_name+'" is now: '+STATUS_LABEL[newStatus],read:false}])
  }
  // Update local state
  const r=getReq(id);if(r){r.status=newStatus;Object.assign(r,extra)}
  toast('Status updated')
}

// ─── RENDER HELPERS ──────────────────────────────────────────
function scoreBadge(s){
  if(s>=70) return '<span class="badge badge-high">High Priority</span>'
  if(s>=40) return '<span class="badge badge-medium">Medium</span>'
  if(s>0)   return '<span class="badge badge-low">Standard</span>'
  return ''
}
function priBar(s){
  if(!s) return ''
  return `<div class="pri-bar"><div class="pri-fill" style="width:${s}%;background:${scoreColor(s)}"></div></div>`
}
function deadlineTag(d,status){
  if(!d||status==='done') return ''
  const n=days(d)
  if(n===null) return ''
  const color=n<0?'#dc2626':n<7?'#dc2626':n<14?'#d97706':'#6b6966'
  const label=n<0?'Overdue':n===0?'Today':n+'d away'
  return `<span style="color:${color};font-weight:${n<14?600:400}">${fmtShort(d)} (${label})</span>`
}

function showApp(){
  const role=USER?.role
  const tabs=[]
  tabs.push({id:'requests',label:'Requests'})
  if(isMkt()) tabs.push({id:'queue',label:'Queue'},{id:'workload',label:'Workload'},{id:'calendar',label:'Calendar'},{id:'performance',label:'Performance'})
  if(isAdmin()) tabs.push({id:'admin',label:'Admin'},{id:'users',label:'Users'})
  const newBtn = `<button class="nav-btn accent" onclick="goNew()">+ New Request</button>`

  const roleBadge=`<span class="user-badge ${role}">${role}</span>`
  const activeTab = ['new','submitted','detail'].includes(VIEW)?'requests':VIEW

  q('root').innerHTML=`
  <header class="header">
    <div class="header-logo">🦬 <span>BGPD</span> Marketing Hub</div>
    <div class="header-right">
      <span style="font-size:13px;color:rgba(255,255,255,.7);display:none" id="hdr-name">${esc(USER?.full_name)}</span>
      ${roleBadge}
      <button class="btn-signout" onclick="doSignOut()">Sign out</button>
    </div>
  </header>
  <nav class="nav">
    ${tabs.map(t=>`<button class="nav-btn${activeTab===t.id?' active':''}" onclick="navTo('${t.id}')">${esc(t.label)}</button>`).join('')}

  </nav>
  <div class="page" id="main-content"></div>`

function renderView(){
  const el=q('main-content')
  if(!el)return
  if(VIEW==='requests') el.innerHTML = isMkt() ? renderAllReqs() : renderMyReqs()
  else if(VIEW==='new') el.innerHTML = renderForm()
  else if(VIEW==='submitted') el.innerHTML = renderConfirm()
  else if(VIEW==='detail') el.innerHTML = renderDetail()
  else if(VIEW==='queue') el.innerHTML = renderQueue()
  else if(VIEW==='workload') el.innerHTML = renderWorkload()
  else if(VIEW==='calendar') el.innerHTML = renderCalendar()
  else if(VIEW==='performance') el.innerHTML = renderPerformance()
  else if(VIEW==='admin') el.innerHTML = renderAdminReqs()
  else if(VIEW==='users') el.innerHTML = renderUsers()
  bindView()
}

async function navTo(v){
  FILTER='all';SEARCH='';SELECTED=new Set();SEL_ID=null
  if(v==='requests'&&isMkt()) await loadAllReqs()
  else if(v==='admin') await loadAllReqs()
  else if(v==='users') await loadUsers()
  else if(v==='queue'||v==='workload'||v==='calendar'||v==='performance') await loadAllReqs()
  else await loadReqs()
  VIEW=v; showApp()
}
function goNew(){
  FORM=blankForm(); FORM_STEP=1; VIEW='new'; showApp()
}

                  ?`<button class="btn btn-xs btn-green" onclick="unarchiveReq('${r.id}')" title="Restore">📤</button>`
                  :`<button class="btn btn-xs" onclick="archiveReq('${r.id}')" title="Archive">📦</button>`
                }
                <button class="btn btn-xs btn-red" onclick="deleteReq('${r.id}')" title="Delete">🗑</button>`
              :''}
            </div>
          </td>
        </tr>`
      }).join('')}
    </tbody>
  </table></div>`}`
}

function rerenderScore(){
  const f=FORM;if(!f)return
  const s=score(f)
  const bar=q('score-bar')
  if(bar){
    bar.style.display=s>0?'':'none'
    if(s>0) bar.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:#6b6966">Priority score</span><div style="flex:1;height:5px;background:#e5e3dc;border-radius:3px;overflow:hidden"><div style="width:${s}%;height:100%;background:${scoreColor(s)};border-radius:3px"></div></div>${scoreBadge(s)} <span style="font-size:12px;font-weight:600;color:${scoreColor(s)}">${s}/100</span></div>`
  }
}

function toggleCh(v){
  if(!FORM)return
  const chs=FORM.channels||[]
  FORM.channels=chs.includes(v)?chs.filter(c=>c!==v):[...chs,v]
  document.querySelectorAll('.channel-grid .chip').forEach(el=>{
    const chV=CHANNELS.find(c=>el.textContent.trim().includes(c.l))?.v
    if(chV) el.classList.toggle('on',FORM.channels.includes(chV))
  })
}

function validateStep1(){
  let ok=true
  const nameField=q('field-name')
  const nameInput=q('f-name')
  if(!FORM?.program_name?.trim()){
    ok=false
    nameField?.classList.add('field-error')
    nameInput?.focus()
  } else nameField?.classList.remove('field-error')
  if(!FORM?.marketing_goal){
    ok=false
    const ge=q('goal-err');if(ge)ge.style.display='flex'
  }
  if(!ok){
    const fe=q('form-err')
    if(fe){fe.textContent='Please fill in the required fields above.';fe.style.display='flex'}
    window.scrollTo({top:0,behavior:'smooth'})
    return
  }
  const fe=q('form-err');if(fe)fe.style.display='none'
  FORM_STEP=2; renderView(); window.scrollTo({top:0,behavior:'smooth'})
}

async function handleSubmit(){
  if(!FORM)return
  const fe=q('form-err');if(fe)fe.style.display='none'
  await submitRequest()
}

function backToReqs(){
  FORM=null;FORM_STEP=1
  navTo('requests')
}

  const chs=Array.isArray(r.channels)?r.channels:[]
  const hi=Array.isArray(r.highlights)?r.highlights:typeof r.highlights==='string'?r.highlights.split('\n').filter(Boolean):[]

  return`

          ${r.clarification_needed&&!mkt?'<span class="badge badge-reviewing">⚠ Needs your info</span>':''}
        </div>
        <div style="font-size:13px;color:#6b6966;display:flex;gap:12px;flex-wrap:wrap">
          ${r.request_number?`<span>#${r.request_number}</span>`:''}
          <span>By ${esc(r.staff_name||'—')}</span>
          ${r.department?`<span>· ${esc(r.department)}</span>`:''}

        </div>

      ${mkt?`<div style="display:flex;gap:6px;flex-wrap:wrap">
        ${prevStatus?`<button class="btn btn-sm" onclick="detailChangeStatus('${r.id}','${prevStatus}')">← ${STATUS_LABEL[prevStatus]}</button>`:''}
        ${nextStatus?`<button class="btn btn-sm btn-primary" onclick="detailChangeStatus('${r.id}','${nextStatus}')">→ ${STATUS_LABEL[nextStatus]}</button>`:''}

function renderTab(r,mkt,admin,chs,hi,s){

    const fields=[
      ['Program',r.program_name],['Type',r.program_type],['Season',r.season],
      ['Dates',[r.start_date&&fmt(r.start_date),r.end_date&&fmt(r.end_date)].filter(Boolean).join(' → ')||null],
      ['Time',r.program_time],['Location',r.location],
      ['Reg. deadline',r.registration_deadline?fmt(r.registration_deadline)+' ('+days(r.registration_deadline)+'d)':null],
      ['Enrollment goal',r.enrollment_goal?r.enrollment_goal+' participants':null],
      ['Staff',r.staff_name],['Department',r.department],

        <button class="btn btn-sm btn-primary" onclick="saveMktNotes('${r.id}')">Save notes</button>

          <input type="checkbox" id="clar-chk" ${r.clarification_needed?'checked':''} onchange="toggleClar('${r.id}',this.checked)"> Flag — needs staff info

      </div>

// ─── PERFORMANCE ───────────────────────────────────────────────
function renderPerformance(){
  const reqs=ALL_REQS.filter(r=>!r.is_archived)
  const total=reqs.length,done=reqs.filter(r=>r.status==='done').length
  const avg=total?Math.round(reqs.reduce((s,r)=>s+(r.priority_score||0),0)/total):0
  const bd={},bg={},bc={}
  reqs.forEach(r=>{
    const dept=r.department||'Unknown';bd[dept]=(bd[dept]||0)+1
    const goal=r.marketing_goal||'Not set';bg[goal]=(bg[goal]||0)+1
    ;(r.channels||[]).forEach(c=>{bc[c]=(bc[c]||0)+1})
  })
  const topDept=Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,6)
  const topGoal=Object.entries(bg).sort((a,b)=>b[1]-a[1]).slice(0,5)
  const topCh=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,6)
  return`
  <div class="sec-head"><div class="sec-title">Performance</div></div>
  <div class="g4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Complete</div><div class="stat-value" style="color:#15803d">${done}</div><div style="font-size:12px;color:#6b6966;margin-top:3px">${total?Math.round(done/total*100):0}%</div></div>
    <div class="stat"><div class="stat-label">Avg Score</div><div class="stat-value" style="color:#d97706">${avg}</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value" style="color:#2563eb">${reqs.filter(r=>r.status!=='done').length}</div></div>
  </div>
  <div class="g3">
    <div class="card"><div class="sec-label" style="margin-bottom:12px">By Department</div>
      ${topDept.map(([d,c])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d)}</span>
        <div style="width:60px;height:4px;background:#e5e3dc;border-radius:2px;overflow:hidden;flex-shrink:0"><div style="width:${total?Math.round(c/total*100):0}%;height:100%;background:#2563eb"></div></div>
        <span style="font-size:12px;color:#6b6966;width:18px;text-align:right">${c}</span>
      </div>`).join('')}
    </div>
    <div class="card"><div class="sec-label" style="margin-bottom:12px">By Goal</div>
      ${topGoal.map(([g,c])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g)}</span>
        <div style="width:50px;height:4px;background:#e5e3dc;border-radius:2px;overflow:hidden;flex-shrink:0"><div style="width:${total?Math.round(c/total*100):0}%;height:100%;background:#15803d"></div></div>
        <span style="font-size:12px;color:#6b6966;width:18px;text-align:right">${c}</span>
      </div>`).join('')}
    </div>
    <div class="card"><div class="sec-label" style="margin-bottom:12px">Top Channels</div>
      ${topCh.map(([cv,c])=>{const ch=CHANNELS.find(x=>x.v===cv);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:15px">${ch?.i||'📌'}</span>
        <span style="font-size:13px;flex:1">${ch?.l||cv}</span>
        <span style="font-size:12px;color:#6b6966;font-weight:600">${c}</span>
      </div>`}).join('')}
    </div>
  </div>`
}

async function saveEdit(id){
  const name=q('e-name')?.value?.trim()
  if(!name){toast('Program name required','err');return}
  setLoading('save-edit-btn',true)

  const selectedChs=[...document.querySelectorAll('#e-channels .chip.on')]
    .map(el=>CHANNELS.find(ch=>el.textContent.trim().includes(ch.l))?.v)
    .filter(Boolean)

  const newStatus=q('e-status')?.value||'new'
  const extra={}
  const req=getReq(id)
  if(newStatus==='done'&&req?.status!=='done') extra.completed_at=new Date().toISOString()
  if(newStatus==='active'&&req?.status!=='active'){extra.approved_at=new Date().toISOString();extra.approved_by=USER.full_name}

  const fields={
    program_name:name,
    program_type:q('e-type')?.value||null,
    start_date:q('e-start')?.value||null,
    end_date:q('e-end')?.value||null,
    location:q('e-loc')?.value||null,
    registration_deadline:q('e-deadline')?.value||null,
    staff_name:q('e-staff')?.value||null,
    department:q('e-dept')?.value||null,
    season:q('e-season')?.value||null,
    enrollment_goal:q('e-enroll')?.value?parseInt(q('e-enroll').value):null,
    marketing_goal:q('e-goal')?.value||null,
    status:newStatus,
    assigned_to_name:q('e-assigned')?.value||null,
    key_message:q('e-msg')?.value||null,
    marketing_notes:q('e-mkt-notes')?.value||null,
    notes:q('e-notes')?.value||null,
    channels:selectedChs,
    ...extra,
  }

  const {error}=await SB.from('marketing_requests').update(fields).eq('id',id)
  setLoading('save-edit-btn',false)
  if(error){toast('Error: '+error.message,'err');return}

  if(req?.status!==newStatus){
    SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:'admin',old_status:req?.status,new_status:newStatus,note:'Edited by admin'}])
  }
  Object.assign(req,fields)
  closeModal('modal-edit')
  toast('Changes saved ✓')
  renderView()
}

  const u=USERS_LIST.find(x=>x.id===id);if(!u)return
  const m=q('modal-user')
  m.innerHTML=`<div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit User</div>
      <button class="modal-close" onclick="closeModal('modal-user')">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Full name ✱</label><input id="eu-name" value="${esc(u.full_name)}"></div>
      <div class="field"><label>Email ✱</label><input type="email" id="eu-email" value="${esc(u.email)}"></div>
      <div class="g2">
        <div class="field"><label>Role</label><select id="eu-role">${['staff','marketing','admin'].map(r=>`<option value="${r}"${u.role===r?' selected':''}>${r}</option>`).join('')}</select></div>
        <div class="field"><label>Department</label><select id="eu-dept"><option value="">None</option>${DEPTS.map(d=>`<option${u.department===d?' selected':''}>${d}</option>`).join('')}</select></div>
      </div>
      <div class="alert alert-info" style="margin-top:4px">ℹ️ Changing email here updates their profile only. To change their login email, also update it in Supabase → Auth.</div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-user')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser('${id}')">Save Changes</button>
    </div>
  </div>`
  m.classList.add('open')
  m.addEventListener('click',e=>{if(e.target===m)closeModal('modal-user')})
}

async function createUser(){
  const name=q('u-name')?.value?.trim()
  const email=q('u-email')?.value?.trim()
  const role=q('u-role')?.value
  const dept=q('u-dept')?.value
  const pass=q('u-pass')?.value?.trim()
  if(!name){toast('Full name is required','err');return}
  if(!email){toast('Email is required','err');return}
  if(!pass){toast('Set a temporary password','err');return}
  // Validate email format
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Please enter a valid email address','err');return}
  setLoading('u-submit-btn',true)
  const {data,error}=await SB.from('mkt_users').insert([{
    full_name:name,email:email.toLowerCase(),role:role||'staff',
    department:dept||null,is_active:true
  }]).select().single()
  setLoading('u-submit-btn',false)
  if(error){
    const msg=error.message.includes('unique')||error.message.includes('duplicate')
      ?'A user with this email already exists.'
      :'Error creating user: '+error.message
    toast(msg,'err')
    const res=q('u-result')
    if(res) res.innerHTML=`<div class="alert alert-error" style="margin-top:10px">⚠️ ${esc(msg)}</div>`
    return
  }
  const res=q('u-result')
  if(res) res.innerHTML=`<div class="alert alert-success" style="margin-top:10px">
    ✅ <strong>${esc(name)} added successfully!</strong><br>
    <div style="margin-top:6px;font-size:12px;line-height:1.6">
      <strong>Next steps:</strong><br>
      1. Send them the app URL<br>
      2. Their temporary password: <code style="background:#f0fdf4;padding:2px 6px;border-radius:4px;font-weight:700">${esc(pass)}</code><br>
      3. Message Claude: "Set up login for ${esc(email)} password ${esc(pass)}" to activate their Supabase login
    </div>
  </div>`
  await loadUsers()
  // Don't auto-close — let user read the instructions
}

async function saveUser(id){
  const name=q('eu-name')?.value?.trim()
  const email=q('eu-email')?.value?.trim()
  const role=q('eu-role')?.value
  const dept=q('eu-dept')?.value
  if(!name||!email){toast('Name and email required','err');return}
  const {error}=await SB.from('mkt_users').update({full_name:name,email,role,department:dept||null}).eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  closeModal('modal-user')
  const u=USERS_LIST.find(x=>x.id===id)
  if(u) Object.assign(u,{full_name:name,email,role,department:dept||null})
  renderView(); toast('User updated ✓')
}

async function toggleUserActive(id,active){
  await SB.from('mkt_users').update({is_active:active}).eq('id',id)
  const u=USERS_LIST.find(x=>x.id===id);if(u)u.is_active=active
  renderView(); toast(active?'User activated':'User deactivated')
}

async function deleteUser(id,name){
  if(!confirm('Delete "'+name+'"?\n\nThis removes their profile from the app. Their login account must be removed separately in Supabase → Authentication → Users.'))return
  const {error}=await SB.from('mkt_users').delete().eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  USERS_LIST=USERS_LIST.filter(u=>u.id!==id)
  renderView()
  toast('User deleted')
}

// ─── DETAIL ACTIONS ────────────────────────────────────────────
async function openDetail(id){
  SEL_ID=id; DETAIL_TAB='brief'
  if(!getReq(id)){
    const {data}=await SB.from('marketing_requests').select('*').eq('id',id).single()
    if(data) ALL_REQS.push(data)
  }
  await loadDetail(id)
  VIEW='detail'; showApp()
}

function backFromDetail(){
  SEL_ID=null
  navTo('requests')
}

function switchTab(t){
  DETAIL_TAB=t
  const r=getReq(SEL_ID);if(!r)return
  const mkt=isMkt(),admin=isAdmin()
  const chs=Array.isArray(r.channels)?r.channels:[]
  const hi=Array.isArray(r.highlights)?r.highlights:typeof r.highlights==='string'?r.highlights.split('\n').filter(Boolean):[]
  const s=r.priority_score||0
  q('tab-content').innerHTML=renderTab(r,mkt,admin,chs,hi,s)
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.textContent.toLowerCase().includes(t.substring(0,4)))
  })
  // fix active tab highlight properly
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'))
  const tabMap={brief:'📋',messages:'💬',deliverables:'✅',timeline:'🕐'}
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    if(btn.textContent.startsWith(tabMap[t])) btn.classList.add('active')
  })
}

async function detailChangeStatus(id,status){
  await changeStatus(id,status)
  const r=getReq(id)
  if(r){
    await loadDetail(id)
    VIEW='detail'; showApp()
  }
}

async function saveMktNotes(id){
  const notes=q('mkt-notes')?.value||''
  const {error}=await SB.from('marketing_requests').update({marketing_notes:notes}).eq('id',id)
  if(error){toast('Error saving','err');return}
  const r=getReq(id);if(r)r.marketing_notes=notes
  toast('Notes saved')
}

async function toggleClar(id,checked){
  await SB.from('marketing_requests').update({clarification_needed:checked}).eq('id',id)
  const r=getReq(id);if(r)r.clarification_needed=checked
  await loadDetail(id)
  VIEW='detail'; showApp()
}

async function saveClarNote(id,note){
  await SB.from('marketing_requests').update({clarification_note:note}).eq('id',id)
  const r=getReq(id);if(r)r.clarification_note=note
}

async function sendMsg(id){
  const body=q('comment-input')?.value?.trim()
  const internal=q('internal-chk')?.checked||false
  if(!body){toast('Please write a message','err');return}
  const {error}=await SB.from('mkt_comments').insert([{request_id:id,author_name:USER.full_name,author_role:USER.role,body,is_internal:internal}])
  if(error){toast('Error sending','err');return}
  await loadDetail(id)
  switchTab('messages')
  toast('Message sent')
}

async function toggleDeliv(id,checked){
  await SB.from('mkt_deliverables').update({completed:checked,completed_at:checked?new Date().toISOString():null,completed_by:checked?USER.full_name:null}).eq('id',id)
  await loadDetail(SEL_ID)
  switchTab('deliverables')
}

async function addDeliv(reqId){
  const label=q('new-deliv')?.value?.trim()
  const date=q('new-deliv-date')?.value
  if(!label){toast('Enter a deliverable','err');return}
  await SB.from('mkt_deliverables').insert([{request_id:reqId,label,due_date:date||null,sort_order:DELIVS.length}])
  await loadDetail(reqId)
  switchTab('deliverables')
}

async function submitFeedback(id){
  if(!FEEDBACK_RATING){toast('Please select a rating','err');return}
  const note=q('fb-note')?.value||''
  await SB.from('marketing_requests').update({feedback_rating:FEEDBACK_RATING,feedback_note:note}).eq('id',id)
  const r=getReq(id);if(r){r.feedback_rating=FEEDBACK_RATING;r.feedback_note=note}
  FEEDBACK_RATING=0
  toast('Feedback submitted — thank you!')
  switchTab('brief')
}

// ─── ADMIN ACTIONS ──────────────────────────────────────────────
async function quickStatus(id,status){
  await changeStatus(id,status,'Admin status change')
  renderView()
}

async function reopenReq(id){
  if(!confirm('Reopen this request?'))return
  const r=getReq(id)
  await SB.from('marketing_requests').update({status:'active',completed_at:null}).eq('id',id)
  SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:'admin',old_status:r?.status,new_status:'active',note:'Reopened by admin'}])
  if(r){r.status='active';r.completed_at=null}
  toast('Request reopened'); renderView()
}

async function archiveReq(id){
  if(!confirm('Archive this request?'))return
  await SB.from('marketing_requests').update({is_archived:true}).eq('id',id)
  const r=getReq(id);if(r)r.is_archived=true
  toast('Archived'); renderView()
  if(VIEW==='detail') backFromDetail()
}

async function unarchiveReq(id){
  await SB.from('marketing_requests').update({is_archived:false}).eq('id',id)
  const r=getReq(id);if(r)r.is_archived=false
  toast('Restored from archive'); renderView()
}

async function deleteReq(id){
  const r=getReq(id)
  if(!confirm('Permanently delete "'+( r?.program_name||'this request')+'"? Cannot be undone.'))return
  await SB.from('mkt_comments').delete().eq('request_id',id)
  await SB.from('mkt_deliverables').delete().eq('request_id',id)
  await SB.from('mkt_status_history').delete().eq('request_id',id)
  await SB.from('mkt_notifications').delete().eq('request_id',id)
  await SB.from('marketing_requests').delete().eq('id',id)
  ALL_REQS=ALL_REQS.filter(x=>x.id!==id)
  toast('Deleted permanently'); renderView()
  if(VIEW==='detail'){SEL_ID=null;navTo('requests')}
}

function selToggle(id,checked){if(checked)SELECTED.add(id);else SELECTED.delete(id);renderView()}
function selAll(checked,ids){SELECTED=checked?new Set(ids):new Set();renderView()}

async function bulkStatus(status){
  const ids=[...SELECTED];if(!ids.length)return
  for(const id of ids) await changeStatus(id,status,'Bulk admin update')
  SELECTED=new Set(); renderView(); toast(ids.length+' updated')
}
async function bulkArchive(){
  const ids=[...SELECTED];if(!ids.length||!confirm('Archive '+ids.length+' requests?'))return
  for(const id of ids){await SB.from('marketing_requests').update({is_archived:true}).eq('id',id);const r=getReq(id);if(r)r.is_archived=true}
  SELECTED=new Set(); renderView(); toast(ids.length+' archived')
}
async function bulkDelete(){
  const ids=[...SELECTED];if(!ids.length||!confirm('Permanently delete '+ids.length+' requests?'))return
  for(const id of ids){
    await SB.from('mkt_comments').delete().eq('request_id',id)
    await SB.from('mkt_deliverables').delete().eq('request_id',id)
    await SB.from('mkt_status_history').delete().eq('request_id',id)
    await SB.from('mkt_notifications').delete().eq('request_id',id)
    await SB.from('marketing_requests').delete().eq('id',id)
  }
  ALL_REQS=ALL_REQS.filter(r=>!ids.includes(r.id))
  SELECTED=new Set(); renderView(); toast(ids.length+' deleted')
}

function bindView(){
  // Close modals on background click - already handled per modal
}

boot()
</script>
