<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGPD Marketing Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#F5F4F0;--surface:#fff;--border:#E4E2DA;--border-light:#F0EFEB;
  --text:#1A1A18;--text-2:#5A5955;--text-3:#9A9893;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
  --green:#15803D;--green-bg:#F0FDF4;--green-border:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-border:#FDE68A;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
  --shadow-lg:0 8px 40px rgba(0,0,0,.15);
  --trans:all .15s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
input,textarea,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
img{max-width:100%}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}

/* ── LAYOUT ── */
.header{background:var(--text);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;box-shadow:0 1px 0 rgba(255,255,255,.08)}
.logo{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;letter-spacing:-.01em;white-space:nowrap}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-sub{opacity:.45;font-weight:400;margin-left:2px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.role-chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.01em}
.role-chip.staff{background:#1E3D15;color:#86EFAC}
.role-chip.marketing{background:#1E3052;color:#93C5FD}
.role-chip.admin{background:#3B1F5C;color:#C4B5FD}
.hdr-user{font-size:12px;color:rgba(255,255,255,.55);display:none}
@media(min-width:600px){.hdr-user{display:block}}
.btn-out{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;transition:var(--trans)}
.btn-out:hover{background:rgba(255,255,255,.15);color:#fff}

.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:stretch;gap:0;position:sticky;top:52px;z-index:100}
.nav-btn{padding:11px 13px;font-size:13px;font-weight:500;color:var(--text-2);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:var(--trans);position:relative;letter-spacing:-.01em}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.nav-btn.new-req{color:var(--blue);font-weight:600;margin-left:auto}
.nav-btn.new-req:hover{color:#1D4ED8}
.nav-notif{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--red)}

.page{max-width:1100px;margin:0 auto;padding:24px 16px}
@media(max-width:600px){.page{padding:14px 10px}}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-flat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.card+.card{margin-top:12px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:720px){.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── TYPOGRAPHY ── */
.page-title{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.page-sub{font-size:13px;color:var(--text-2);margin-top:3px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:10px}

/* ── FIELDS ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:#2A2A28;margin-bottom:5px;letter-spacing:-.01em}
.req{color:var(--red)}
.opt{font-size:11px;font-weight:400;color:var(--text-3);margin-left:3px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s,box-shadow .12s;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field .hint{font-size:11px;color:var(--text-3);margin-top:4px;line-height:1.4}
.field-err input,.field-err select,.field-err textarea{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,.08)!important}
.field-err .err-msg{display:block!important}
.err-msg{display:none;font-size:11px;color:var(--red);margin-top:4px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:var(--trans);white-space:nowrap;letter-spacing:-.01em;line-height:1}
.btn:hover{background:#F5F4F0;border-color:#C4C2BA}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--text);border-color:var(--text);color:#fff}
.btn-primary:hover{background:#333;border-color:#333}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:#1D4ED8;border-color:#1D4ED8}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-green:hover{background:#166534}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn-red:hover{background:#FEE2E2}
.btn-amber{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.btn-amber:hover{background:#FEF3C7}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--border-light);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-block{width:100%}
.btn-icon{padding:6px;border-radius:6px;width:30px;height:30px}
.spin-btn::after{content:'';display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-left:5px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.badge-new{background:var(--blue-bg);color:#1D4ED8}
.badge-reviewing{background:var(--amber-bg);color:#92400E}
.badge-active{background:var(--green-bg);color:#166534}
.badge-done{background:#F3F4F6;color:#4B5563}
.badge-staff{background:var(--green-bg);color:#166534}
.badge-marketing{background:var(--blue-bg);color:#1D4ED8}
.badge-admin{background:var(--purple-bg);color:var(--purple)}
.badge-hi{background:var(--red-bg);color:var(--red)}
.badge-med{background:var(--amber-bg);color:#92400E}
.badge-lo{background:var(--green-bg);color:#166534}
.badge-archived{background:#F3F4F6;color:#6B7280}

/* ── STATS ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.02em}
.stat-delta{font-size:12px;color:var(--text-3);margin-top:4px}

/* ── REQUEST CARDS ── */
.req-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:var(--trans);margin-bottom:10px;position:relative}
.req-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(37,99,235,.1);transform:translateY(-1px)}
.req-card:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.req-card.needs-info{border-left:3px solid var(--amber)}
.req-card-title{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em;color:var(--text)}
.req-card-meta{font-size:12px;color:var(--text-2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.req-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);flex-wrap:wrap;gap:6px}

/* ── PRIORITY BAR ── */
.pri-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.pri-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ── ALERTS ── */
.alert{border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;line-height:1.5;border:1px solid}
.alert-warn{background:var(--amber-bg);border-color:var(--amber-border);color:#92400E}
.alert-info{background:var(--blue-bg);border-color:var(--blue-border);color:#1D4ED8}
.alert-success{background:var(--green-bg);border-color:var(--green-border);color:#166534}
.alert-error{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.alert-icon{font-size:15px;flex-shrink:0;line-height:1.5}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);text-align:left;background:#F8F7F4;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:hover td{background:#FAFAF8}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding:20px 10px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:580px;box-shadow:var(--shadow-lg);margin:auto;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.01em}
.modal-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.modal-x{background:none;border:none;font-size:20px;color:var(--text-3);cursor:pointer;padding:2px 4px;line-height:1;border-radius:4px}
.modal-x:hover{color:var(--text);background:var(--border-light)}
.modal-bd{padding:20px 22px;max-height:72vh;overflow-y:auto}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.modal-ft-split{justify-content:space-between}

/* ── TOAST ── */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:300px}
.toast{background:var(--text);color:#fff;padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:slideUp .2s ease;display:flex;align-items:center;gap:8px}
.toast-icon{font-size:15px;flex-shrink:0}
.toast.ok{background:#15803D}
.toast.err{background:#DC2626}
.toast.warn{background:#D97706}

/* ── STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:24px;gap:0;overflow-x:auto;padding-bottom:2px}
.step{display:flex;align-items:center;gap:7px;flex-shrink:0}
.step-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--surface);color:var(--text-3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
.step-lbl{font-size:12px;color:var(--text-3);white-space:nowrap}
.step.active .step-num{background:var(--text);border-color:var(--text);color:#fff}
.step.active .step-lbl{color:var(--text);font-weight:600}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step.done .step-lbl{color:var(--green)}
.step-line{width:24px;height:2px;background:var(--border);flex-shrink:0;transition:background .3s}
.step-line.done{background:var(--green)}

/* ── CHANNELS ── */
.ch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
@media(max-width:480px){.ch-grid{grid-template-columns:repeat(2,1fr)}}
.chip{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;cursor:pointer;font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:7px;transition:var(--trans);user-select:none;font-weight:500}
.chip:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.chip.on{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.chip-icon{font-size:16px;flex-shrink:0}

/* ── GOALS ── */
.goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:480px){.goal-grid{grid-template-columns:1fr 1fr}}
.goal-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:var(--trans)}
.goal-card:hover{border-color:var(--blue);background:var(--blue-bg)}
.goal-card.on{border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.goal-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}
.goal-desc{font-size:11px;color:var(--text-2);line-height:1.4}
.goal-card.on .goal-name{color:var(--blue)}
.goal-card.on .goal-desc{color:#3B82F6}

/* ── PRIORITY PILLS ── */
.pri-pills{display:flex;gap:4px}
.pri-pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:var(--trans);font-weight:500}
.pri-pill:hover{border-color:var(--blue);color:var(--blue)}
.pri-pill.on{background:var(--text);border-color:var(--text);color:#fff}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-wrap{position:relative;flex:1;max-width:280px;min-width:160px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-3);pointer-events:none}
.search-input{width:100%;padding:8px 10px 8px 30px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--surface);color:var(--text);transition:border-color .12s}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:var(--trans)}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.on{background:var(--text);border-color:var(--text);color:#fff}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
@media(max-width:900px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kanban{grid-template-columns:1fr}}
.k-col{background:#F5F4F0;border-radius:var(--radius);padding:12px;border:1px solid var(--border)}
.k-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.k-col-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)}
.k-count{font-size:11px;background:var(--surface);border-radius:20px;padding:1px 8px;color:var(--text-2);border:1px solid var(--border);font-weight:600}
.k-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:var(--trans);overflow:hidden}
.k-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.k-card-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3;color:var(--text)}
.k-card-meta{font-size:11px;color:var(--text-2);margin-bottom:6px}
.k-card-stripe{height:3px;margin:-12px -13px 10px;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.k-empty{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;font-size:12px;color:var(--text-3)}

/* ── DETAIL TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;gap:0}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-2);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;cursor:pointer;transition:var(--trans);letter-spacing:-.01em}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}

/* ── COMMENTS ── */
.comment{display:flex;gap:10px;margin-bottom:14px;animation:fadeIn .2s ease}
.ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em}
.ava-staff{background:linear-gradient(135deg,#15803D,#166534)}
.ava-marketing{background:linear-gradient(135deg,#2563EB,#1D4ED8)}
.ava-admin{background:linear-gradient(135deg,#7C3AED,#6D28D9)}
.comment-bub{flex:1;background:#F5F4F0;border-radius:0 10px 10px 10px;padding:10px 13px}
.comment-bub.internal{background:var(--amber-bg);border:1px dashed var(--amber-border)}
.comment-meta{font-size:11px;color:var(--text-3);margin-bottom:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.comment-body{font-size:13px;line-height:1.5;color:var(--text)}

/* ── DELIVERABLES ── */
.deliv{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);background:#F5F4F0;margin-bottom:6px;transition:var(--trans)}
.deliv.done-d{background:var(--green-bg)}
.deliv input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.deliv-lbl{flex:1;font-size:13px}
.deliv-lbl.struck{text-decoration:line-through;color:var(--text-3)}

/* ── TIMELINE ── */
.tl{position:relative}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:4px;top:14px;bottom:0;width:2px;background:var(--border)}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:3px;transition:var(--trans)}
.tl-dot.latest{background:var(--blue)}
.tl-action{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.tl-meta{font-size:11px;color:var(--text-3);margin-top:2px}

.confirm-title{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--green);letter-spacing:-.02em}

.confirm-item{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text-2);margin-bottom:7px;line-height:1.5}

.status-sel:focus{outline:none;border-color:var(--blue)}

/* ── LOADING ── */

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0F172A 0%,#1E3A5F 60%,#0F172A 100%);padding:20px;position:relative;overflow:hidden}

.login-box{width:100%;max-width:380px;position:relative;z-index:1}
.login-brand{text-align:center;margin-bottom:28px}
.login-brand-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 4px 20px rgba(37,99,235,.4)}

.login-card{background:rgba(255,255,255,.97);border-radius:var(--radius-lg);padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}

/* ── PERF BARS ── */
.perf-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.perf-lbl{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.perf-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.perf-fill{height:100%;border-radius:3px;transition:width .5s ease}
.perf-count{font-size:12px;color:var(--text-3);width:20px;text-align:right;flex-shrink:0;font-weight:600}

/* ── SCORE BAR ── */

/* ── MISC ── */

.dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--border-light);border-radius:20px;font-size:11px;color:var(--text-2);font-weight:500}
.calendar-item{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:var(--trans);box-shadow:var(--shadow)}
.calendar-item:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.cal-date{width:44px;text-align:center;flex-shrink:0}
.cal-day{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.02em}
.cal-month{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-top:1px}

<script>
'use strict'
// ── CONFIG ──────────────────────────────────────────────────────
const SB = supabase.createClient(

  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3aGpieHBoaGZqeGZhcWh0bGF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjkyMjMsImV4cCI6MjA5MTI0NTIyM30.MOF7y4G7ZuIx8oTRO9TEEwyRy2zZl1pMk2dpdFvUtDw'
)

// ── CONSTANTS ────────────────────────────────────────────────────
const SL = {new:'Submitted',reviewing:'Being Reviewed',active:'In Progress',done:'Complete'}
const SB2 = {new:'badge-new',reviewing:'badge-reviewing',active:'badge-active',done:'badge-done'}
const STATUSES = ['new','reviewing','active','done']
const GOALS = [

  {v:'Financial sustainability',d:'Revenue & cost recovery'},
  {v:'Fill underutilized space',d:'Busy slow times & facilities'},
  {v:'Build long-term participation',d:'Feed future programs'},
  {v:'Community connection',d:'Visibility & partnerships'},
  {v:'Quality & innovation',d:'Test new concepts'},
]
const CHS = [

]
const DEPTS = ['Recreation','Marketing','Parks','Business','Other']
const SEASONS = ['Spring 2026','Summer 2026','Fall 2026','Winter 2026','Spring 2027','Summer 2027']
const PTYPES = ['Program / class','Community event','Facility rental','Special event','Membership campaign','League / sport']

// ── STATE ────────────────────────────────────────────────────────
let USER=null, VIEW='requests', ALL_REQS=[]
let COMMENTS=[], DELIVS=[], HISTORY=[]
let SEL_ID=null, DETAIL_TAB='brief'
let FORM=null, FORM_STEP=1, LAST_SUBMITTED=null
let FILTER='all', SEARCH='', SHOW_ARCHIVED=false
let SELECTED=new Set(), USERS_LIST=[]
let FB_RATING=0

// ── HELPERS ──────────────────────────────────────────────────────
const q = id => document.getElementById(id)
const qs = sel => document.querySelector(sel)
const qsa = sel => document.querySelectorAll(sel)
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(d){if(!d)return'';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function daysUntil(d){if(!d)return null;return Math.round((new Date(d)-new Date())/86400000)}
function initials(n){if(!n)return'?';return n.trim().split(/\s+/).map(p=>p[0]).join('').toUpperCase().slice(0,2)}
function avCls(r){return r==='admin'?'ava-admin':r==='marketing'?'ava-marketing':'ava-staff'}
function isMkt(){return USER?.role==='marketing'||USER?.role==='admin'}
function isAdmin(){return USER?.role==='admin'}
function getReq(id){return ALL_REQS.find(r=>r.id===id)}

function calcScore(f){
  let s=0
  const pu={low:5,medium:15,high:30},pi={low:5,medium:15,high:25},pr={low:3,medium:8,high:15}
  if(f.urgency_level)s+=pu[f.urgency_level]||0
  if(f.impact_level)s+=pi[f.impact_level]||0
  if(f.reach_level)s+=pr[f.reach_level]||0
  const d=daysUntil(f.registration_deadline)
  if(d!==null){if(d<7)s+=20;else if(d<14)s+=12;else if(d<21)s+=6}
  if(f.marketing_goal==='Financial sustainability'||f.marketing_goal==='Grow participation')s+=10
  return Math.min(s,100)
}
function scoreColor(s){return s>=70?'#DC2626':s>=40?'#D97706':'#15803D'}
function scoreBadgeCls(s){return s>=70?'badge-hi':s>=40?'badge-med':'badge-lo'}
function scoreBadgeLbl(s){return s>=70?'High Priority':s>=40?'Medium Priority':'Standard'}

function priBar(s){
  if(!s)return''
  return`<div class="pri-bar"><div class="pri-fill" style="width:${s}%;background:${scoreColor(s)}"></div></div>`
}
function deadlineTag(d,status){
  if(!d||status==='done')return''
  const n=daysUntil(d);if(n===null)return''
  const color=n<0?'#DC2626':n<7?'#DC2626':n<14?'#D97706':'#6B7280'
  const weight=n<14?700:400
  const label=n<0?'Overdue':n===0?'Today!':n+'d left'
  return`<span style="color:${color};font-weight:${weight};font-size:12px">${fmtShort(d)} · ${label}</span>`
}

function blankForm(){
  return{program_name:'',program_type:'',start_date:'',end_date:'',program_time:'',
    location:'',registration_deadline:'',enrollment_goal:'',season:'',department:'',
    marketing_goal:'',urgency_level:'',impact_level:'',reach_level:'',
    target_who:'',key_message:'',highlights:'',channels:[],
    photos_supplied:false,photos_by_marketing:false,video_needed:false,graphics_new:false,notes:''}
}

function toast(msg, type='ok', icon=''){
  const icons={ok:'✓',err:'✕',warn:'⚠'}
  const el=document.createElement('div')
  el.className=`toast ${type}`
  el.innerHTML=`<span class="toast-icon">${icon||icons[type]||'ℹ'}</span><span>${esc(msg)}</span>`
  q('toasts').appendChild(el)
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(4px)';el.style.transition='all .25s';setTimeout(()=>el.remove(),250)},3200)
}

function setBtn(id, loading, text=''){
  const btn=q(id);if(!btn)return
  if(loading){btn.classList.add('spin-btn');btn.disabled=true;if(text)btn.dataset.orig=btn.textContent,btn.textContent=text}
  else{btn.classList.remove('spin-btn');btn.disabled=false;if(btn.dataset.orig){btn.textContent=btn.dataset.orig;delete btn.dataset.orig}}
}

// ── AUTH ─────────────────────────────────────────────────────────
async function boot(){
  const {data:{session}} = await SB.auth.getSession()
  if(session) await loadUser(session.user.id)
  else showLogin()
  SB.auth.onAuthStateChange(async(_,s)=>{
    if(s?.user) await loadUser(s.user.id)
    else { USER=null; ALL_REQS=[]; showLogin() }
  })
}

async function loadUser(authId){
  const {data} = await SB.from('mkt_users').select('*').eq('auth_user_id',authId).single()
  USER=data
  if(!USER){showNoAccess();return}
  SB.from('mkt_users').update({last_seen_at:new Date().toISOString()}).eq('id',USER.id)
  await loadReqs()
  showApp()
}

async function doLogin(){
  const email=q('li-email')?.value?.trim()
  const pass=q('li-pass')?.value
  if(!email||!pass){showLoginErr('Please enter your email and password');return}
  const btn=q('li-btn')
  if(btn){btn.textContent='Signing in…';btn.disabled=true}
  const errEl=q('li-err')
  if(errEl)errEl.style.display='none'
  const {error}=await SB.auth.signInWithPassword({email,password:pass})
  if(error){
    if(btn){btn.textContent='Sign in →';btn.disabled=false}
    showLoginErr(error.message)
  }
}
function showLoginErr(msg){const el=q('li-err');if(el){el.textContent=msg;el.style.display='flex'}}

async function doSignOut(){
  USER=null;ALL_REQS=[];VIEW='requests'
  try{await SB.auth.signOut()}catch(e){showLogin()}
}

// ── DATA ─────────────────────────────────────────────────────────
async function loadReqs(){
  let q2=SB.from('marketing_requests').select('*').order('created_at',{ascending:false})
  if(USER.role==='staff')q2=q2.eq('submitted_by_id',USER.id).eq('is_archived',false)
  const {data,error}=await q2
  if(error){toast('Error loading requests','err');return}
  ALL_REQS=data||[]
}
async function loadAllReqs(){
  const {data}=await SB.from('marketing_requests').select('*').order('created_at',{ascending:false})
  ALL_REQS=data||[]
}
async function loadDetail(id){
  const [c,d,h]=await Promise.all([
    SB.from('mkt_comments').select('*').eq('request_id',id).order('created_at',{ascending:true}),
    SB.from('mkt_deliverables').select('*').eq('request_id',id).order('sort_order',{ascending:true}),
    SB.from('mkt_status_history').select('*').eq('request_id',id).order('created_at',{ascending:true}),
  ])
  COMMENTS=c.data||[]; DELIVS=d.data||[]; HISTORY=h.data||[]
}
async function loadUsers(){
  const {data}=await SB.from('mkt_users').select('*').order('full_name')
  USERS_LIST=data||[]
}

async function submitRequest(){
  if(!FORM)return
  const f=FORM
  const payload={
    program_name:f.program_name.trim(),
    program_type:f.program_type||null,
    start_date:f.start_date||null,
    end_date:f.end_date||null,
    program_time:f.program_time||null,
    location:f.location||null,
    registration_deadline:f.registration_deadline||null,
    enrollment_goal:f.enrollment_goal?parseInt(f.enrollment_goal):null,
    season:f.season||null,
    department:f.department||USER?.department||null,
    marketing_goal:f.marketing_goal||null,
    urgency_level:f.urgency_level||null,
    impact_level:f.impact_level||null,
    reach_level:f.reach_level||null,
    target_who:f.target_who||null,
    key_message:f.key_message||null,
    highlights:f.highlights?f.highlights.split('\n').map(s=>s.trim()).filter(Boolean):[],
    channels:Array.isArray(f.channels)?f.channels:[],
    photos_supplied:!!f.photos_supplied,
    photos_by_marketing:!!f.photos_by_marketing,
    video_needed:!!f.video_needed,
    graphics_new:!!f.graphics_new,
    notes:f.notes||null,
    priority_score:calcScore(f),
    status:'new',
    submitted_by_id:USER.id,
    staff_name:USER.full_name,
    is_archived:false,
    clarification_needed:false,
  }
  setBtn('submit-btn',true,'Submitting…')
  const {data,error}=await SB.from('marketing_requests').insert([payload]).select().single()
  setBtn('submit-btn',false)
  if(error){
    toast('Error: '+error.message,'err')
    const fe=q('form-err')
    if(fe){fe.querySelector('.alert-body').textContent='Error: '+error.message;fe.style.display='flex'}
    return
  }
  // Non-blocking side effects
  SB.from('mkt_status_history').insert([{request_id:data.id,changed_by_name:USER.full_name,changed_by_role:USER.role,new_status:'new',note:'Submitted'}])
  SB.from('mkt_notifications').insert([{request_id:data.id,recipient_id:USER.id,type:'submitted',message:'Your request "'+data.program_name+'" was submitted',read:false}])
  LAST_SUBMITTED=data
  FORM=null; FORM_STEP=1
  ALL_REQS.unshift(data)
  VIEW='submitted'; showApp()
}

async function changeStatus(id,newStatus,note=''){
  const req=getReq(id)
  const extra={}
  if(newStatus==='done')extra.completed_at=new Date().toISOString()
  if(newStatus==='active'){extra.approved_at=new Date().toISOString();extra.approved_by=USER.full_name}
  const {error}=await SB.from('marketing_requests').update({status:newStatus,...extra}).eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:USER.role,old_status:req?.status,new_status:newStatus,note:note||'Status updated'}])
  if(req?.submitted_by_id&&req.submitted_by_id!==USER.id){
    SB.from('mkt_notifications').insert([{request_id:id,recipient_id:req.submitted_by_id,type:'status_change',message:'"'+req.program_name+'" is now: '+SL[newStatus],read:false}])
  }
  const r=getReq(id)
  if(r){r.status=newStatus;Object.assign(r,extra)}
}

// ── SHELL ─────────────────────────────────────────────────────────
function showApp(){
  const role=USER?.role
  const activeTab=['new','submitted','detail'].includes(VIEW)?'requests':VIEW

  if(!q('main-content')){
    const tabs=[]
    tabs.push({id:'requests',label:'Requests'})
    if(isMkt())tabs.push({id:'queue',label:'Queue'},{id:'workload',label:'Workload'},{id:'calendar',label:'Calendar'},{id:'performance',label:'Performance'})
    if(isAdmin())tabs.push({id:'admin',label:'Admin'},{id:'users',label:'Users'})

    q('root').innerHTML=`
    <header class="header" role="banner">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">🦬</div>
        Marketing Hub<span class="logo-sub"> · BGPD</span>
      </div>
      <div class="hdr-right">
        <span class="hdr-user">${esc(USER?.full_name)}</span>
        <span class="role-chip ${role}" aria-label="Role: ${role}">${role}</span>
        <button class="btn-out" id="signout-btn">Sign out</button>
      </div>
    </header>
    <nav class="nav" id="app-nav" role="navigation" aria-label="Main navigation">
      ${tabs.map(t=>`<button class="nav-btn" data-nav="${t.id}" aria-label="Go to ${t.label}">${esc(t.label)}</button>`).join('')}
      <button class="nav-btn new-req" id="new-req-btn" aria-label="Submit new marketing request">+ New Request</button>
    </nav>
    <main class="page" id="main-content" role="main" aria-live="polite"></main>`

    // Bind nav ONCE — never rebuilds
    q('signout-btn').addEventListener('click',doSignOut)
    q('new-req-btn').addEventListener('click',goNew)
    q('app-nav').addEventListener('click',e=>{
      const btn=e.target.closest('[data-nav]')
      if(btn)navTo(btn.dataset.nav)
    })
  }

  qsa('[data-nav]').forEach(btn=>btn.classList.toggle('active',btn.dataset.nav===activeTab))
  renderView()
}

function renderView(){
  const el=q('main-content')
  if(!el)return
  if(VIEW==='requests')el.innerHTML=isMkt()?renderAllReqs():renderMyReqs()
  else if(VIEW==='new')el.innerHTML=renderForm()
  else if(VIEW==='submitted')el.innerHTML=renderConfirm()
  else if(VIEW==='detail')el.innerHTML=renderDetail()
  else if(VIEW==='queue')el.innerHTML=renderQueue()
  else if(VIEW==='workload')el.innerHTML=renderWorkload()
  else if(VIEW==='calendar')el.innerHTML=renderCalendar()
  else if(VIEW==='performance')el.innerHTML=renderPerformance()
  else if(VIEW==='admin')el.innerHTML=renderAdminReqs()
  else if(VIEW==='users')el.innerHTML=renderUsers()
}

async function navTo(v){
  FILTER='all';SEARCH='';SELECTED=new Set();SEL_ID=null
  const mc=q('main-content')
  if(mc)mc.innerHTML=`<div class="loading-screen"><div class="spinner"></div> Loading…</div>`
  if(v==='requests'&&isMkt())await loadAllReqs()
  else if(v==='admin')await loadAllReqs()
  else if(v==='users')await loadUsers()
  else if(v==='queue'||v==='workload'||v==='calendar'||v==='performance')await loadAllReqs()
  else await loadReqs()
  VIEW=v; showApp()
}

  FORM=blankForm(); FORM_STEP=1; VIEW='new'; showApp()
}

                :''}
              </div>

          </tr>`
        }).join('')}
      </tbody>
    </table>
  </div>`}`

function rerenderScore(){
  const f=FORM;if(!f)return
  const s=calcScore(f)
  const bar=q('score-bar')
  if(!bar)return
  bar.style.display=s>0?'':'none'
  if(s>0)bar.innerHTML=`<div class="score-preview"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:var(--text-2);font-weight:500">Estimated priority</span><div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${s}%;height:100%;background:${scoreColor(s)};border-radius:3px;transition:width .4s ease"></div></div><span class="badge ${scoreBadgeCls(s)}">${scoreBadgeLbl(s)}</span><span style="font-size:12px;font-weight:700;color:${scoreColor(s)}">${s}<span style="font-weight:400;color:var(--text-3)">/100</span></span></div></div>`
}

function toggleCh(v){
  if(!FORM)return
  const chs=FORM.channels||[]
  FORM.channels=chs.includes(v)?chs.filter(c=>c!==v):[...chs,v]
  qsa('[data-ch]').forEach(el=>{
    const on=FORM.channels.includes(el.dataset.ch)
    el.classList.toggle('on',on)
    el.setAttribute('aria-checked',on)
  })
}

function validateStep1(){
  let ok=true
  const nameField=q('field-name'), nameInput=q('f-name')
  if(!FORM?.program_name?.trim()){
    ok=false
    nameField?.classList.add('field-err')
    nameInput?.setAttribute('aria-invalid','true')
    nameInput?.focus()
  } else {
    nameField?.classList.remove('field-err')
    nameInput?.removeAttribute('aria-invalid')
  }
  if(!FORM?.marketing_goal){
    ok=false
    const ge=q('goal-err');if(ge)ge.style.display='flex'
  }
  if(!ok){
    const fe=q('form-err')
    if(fe){fe.querySelector('.alert-body').textContent='Please fill in the required fields above.';fe.style.display='flex'}
    window.scrollTo({top:0,behavior:'smooth'})
    return
  }
  const fe=q('form-err');if(fe)fe.style.display='none'
  FORM_STEP=2; renderView(); window.scrollTo({top:0,behavior:'smooth'})
}

async function handleSubmit(){
  if(!FORM)return
  const fe=q('form-err');if(fe)fe.style.display='none'
  await submitRequest()
}
function backToReqs(){FORM=null;FORM_STEP=1;navTo('requests')}

// ── QUEUE ──────────────────────────────────────────────────────────
function renderQueue(){
  const reqs=ALL_REQS.filter(r=>!r.is_archived)
  const byS={}
  STATUSES.forEach(s=>byS[s]=reqs.filter(r=>r.status===s).sort((a,b)=>(b.priority_score||0)-(a.priority_score||0)))
  const overdue=reqs.filter(r=>r.registration_deadline&&daysUntil(r.registration_deadline)<0&&r.status!=='done').length

  return`
  <div class="sec-hd">
    <div><div class="page-title">Marketing Queue</div><div class="page-sub">Sorted by priority score — highest first</div></div>
  </div>
  ${overdue?`<div class="alert alert-error"><span class="alert-icon">🚨</span><strong>${overdue} overdue request${overdue>1?'s':''}.</strong> Registration deadline has passed.</div>`:''}
  <div class="g4" style="margin-bottom:20px">
    ${STATUSES.map(s=>`<div class="stat"><div class="stat-label">${SL[s]}</div><div class="stat-value">${byS[s].length}</div></div>`).join('')}
  </div>
  <div class="kanban" role="region" aria-label="Request kanban board">
    ${STATUSES.map(s=>`
    <div class="k-col">
      <div class="k-col-hd">
        <span class="k-col-lbl">${SL[s]}</span>
        <span class="k-count">${byS[s].length}</span>
      </div>
      ${byS[s].length===0?`<div class="k-empty">No requests</div>`:''}
      ${byS[s].map(r=>{

// ── CALENDAR ───────────────────────────────────────────────────────
function renderCalendar(){
  const items=ALL_REQS.filter(r=>!r.is_archived&&(r.registration_deadline||r.start_date))
    .map(r=>({...r,d:r.registration_deadline||r.start_date,type:r.registration_deadline?'Reg. deadline':'Start date'}))
    .sort((a,b)=>new Date(a.d)-new Date(b.d)).slice(0,40)
  const upcoming=items.filter(r=>daysUntil(r.d)>=0).slice(0,20)
  const past=items.filter(r=>daysUntil(r.d)<0).slice(0,10)

  return`
  <div class="sec-hd"><div class="page-title">Calendar</div><div class="page-sub">Upcoming deadlines and start dates</div></div>
  ${upcoming.length===0&&past.length===0?`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No dates set</div><div class="empty-desc">Requests with deadlines or start dates will appear here.</div></div>`:''}
  ${upcoming.length>0?`<div class="sec-label" style="margin-bottom:10px">Upcoming</div>${upcoming.map(r=>{
    const n=daysUntil(r.d),dt=new Date(r.d)
    const urgent=n<7,warn=n>=7&&n<14
    return`<div class="calendar-item" onclick="openDetail('${r.id}')" role="button" aria-label="${esc(r.program_name)} - ${r.type}: ${fmt(r.d)}">
      <div class="cal-date">
        <div class="cal-day" style="color:${urgent?'var(--red)':warn?'var(--amber)':'var(--text)'}">${dt.getDate()}</div>
        <div class="cal-month">${dt.toLocaleString('en-US',{month:'short'})}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.program_name)}</div>
        <div style="font-size:11px;color:var(--text-3)">${r.type} · ${esc(r.staff_name||'')}${r.department?' · '+esc(r.department):''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="badge ${SB2[r.status]}">${SL[r.status]}</span>
        <span class="badge ${n<0?'badge-hi':n<7?'badge-hi':n<14?'badge-med':'badge-lo'}" style="font-size:10px">${n===0?'Today':n+'d left'}</span>
      </div>
    </div>`
  }).join('')}`:''}
  ${past.length>0?`<div class="sec-label" style="margin-bottom:10px;margin-top:${upcoming.length?24:0}px;color:var(--red)">Overdue / Past</div>${past.map(r=>{
    const n=daysUntil(r.d),dt=new Date(r.d)
    return`<div class="calendar-item" onclick="openDetail('${r.id}')" style="opacity:.7" role="button">
      <div class="cal-date"><div class="cal-day" style="color:var(--red)">${dt.getDate()}</div><div class="cal-month">${dt.toLocaleString('en-US',{month:'short'})}</div></div>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="badge ${SB2[r.status]}">${SL[r.status]}</span>
        <span class="badge badge-hi" style="font-size:10px">Overdue ${Math.abs(n)}d</span>
      </div>
    </div>`
  }).join('')}`:''}` 
}

// ── PERFORMANCE ────────────────────────────────────────────────────
function renderPerformance(){
  const reqs=ALL_REQS.filter(r=>!r.is_archived)
  const total=reqs.length, done=reqs.filter(r=>r.status==='done').length
  const active=reqs.filter(r=>r.status!=='done').length
  const avg=total?Math.round(reqs.reduce((s,r)=>s+(r.priority_score||0),0)/total):0
  const hi=reqs.filter(r=>(r.priority_score||0)>=70&&r.status!=='done').length
  const bd={},bg={},bc={},bm={}
  reqs.forEach(r=>{
    const dept=r.department||'Unknown';bd[dept]=(bd[dept]||0)+1
    const goal=r.marketing_goal||'Not set';bg[goal]=(bg[goal]||0)+1
    ;(r.channels||[]).forEach(c=>{bc[c]=(bc[c]||0)+1})
    const mon=r.created_at?new Date(r.created_at).toLocaleString('en-US',{month:'short',year:'2-digit'}):null
    if(mon)bm[mon]=(bm[mon]||0)+1
  })
  const topDept=Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,6)
  const topGoal=Object.entries(bg).sort((a,b)=>b[1]-a[1]).slice(0,6)
  const topCh=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,6)
  const rate=total?Math.round(done/total*100):0

  return`
  <div class="sec-hd"><div class="page-title">Performance</div><div class="page-sub">Overview of all marketing requests</div></div>
  <div class="g4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-label">Total Requests</div><div class="stat-value">${total}</div><div class="stat-delta">${active} active</div></div>
    <div class="stat"><div class="stat-label">Completion Rate</div><div class="stat-value" style="color:var(--green)">${rate}%</div><div class="stat-delta">${done} complete</div></div>
    <div class="stat"><div class="stat-label">Avg Priority</div><div class="stat-value" style="color:${scoreColor(avg)}">${avg}</div><div class="stat-delta">out of 100</div></div>
    <div class="stat"><div class="stat-label">High Priority</div><div class="stat-value" style="color:var(--red)">${hi}</div><div class="stat-delta">score ≥70, active</div></div>
  </div>
  <div class="g3">
    <div class="card">
      <div class="sec-label" style="margin-bottom:14px">By Department</div>
      ${topDept.length===0?`<div style="color:var(--text-3);font-size:13px;font-style:italic">No data yet</div>`:''}
      ${topDept.map(([d,c])=>`<div class="perf-row">
        <div class="perf-lbl">${esc(d)}</div>
        <div class="perf-bar"><div class="perf-fill" style="width:${total?Math.round(c/total*100):0}%;background:var(--blue)"></div></div>
        <div class="perf-count">${c}</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="sec-label" style="margin-bottom:14px">By Goal</div>
      ${topGoal.length===0?`<div style="color:var(--text-3);font-size:13px;font-style:italic">No data yet</div>`:''}
      ${topGoal.map(([g,c])=>`<div class="perf-row">
        <div class="perf-lbl">${esc(g)}</div>
        <div class="perf-bar"><div class="perf-fill" style="width:${total?Math.round(c/total*100):0}%;background:var(--green)"></div></div>
        <div class="perf-count">${c}</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="sec-label" style="margin-bottom:14px">Top Channels Requested</div>
      ${topCh.length===0?`<div style="color:var(--text-3);font-size:13px;font-style:italic">No data yet</div>`:''}
      ${topCh.map(([cv,c])=>{const ch=CHS.find(x=>x.v===cv);return`<div class="perf-row">
        <div style="font-size:15px;flex-shrink:0;width:22px">${ch?.i||'📌'}</div>
        <div class="perf-lbl">${ch?.l||cv}</div>
        <div class="perf-bar"><div class="perf-fill" style="width:${Math.max(...Object.values(bc))>0?Math.round(c/Math.max(...Object.values(bc))*100):0}%;background:var(--purple)"></div></div>
        <div class="perf-count">${c}</div>
      </div>`}).join('')}
    </div>
  </div>`
}

async function saveEdit(id){
  const name=q('e-name')?.value?.trim()
  if(!name){toast('Program name required','err');return}
  setBtn('save-edit-btn',true,'Saving…')
  const selChs=[...qsa('#e-channels .chip.on')].map(el=>CHS.find(ch=>el.textContent.trim().includes(ch.l))?.v).filter(Boolean)
  const newStatus=q('e-status')?.value||'new'
  const req=getReq(id), extra={}
  if(newStatus==='done'&&req?.status!=='done')extra.completed_at=new Date().toISOString()
  if(newStatus==='active'&&req?.status!=='active'){extra.approved_at=new Date().toISOString();extra.approved_by=USER.full_name}
  const fields={
    program_name:name,program_type:q('e-type')?.value||null,start_date:q('e-start')?.value||null,
    end_date:q('e-end')?.value||null,location:q('e-loc')?.value||null,
    registration_deadline:q('e-deadline')?.value||null,staff_name:q('e-staff')?.value||null,
    department:q('e-dept')?.value||null,season:q('e-season')?.value||null,
    enrollment_goal:q('e-enroll')?.value?parseInt(q('e-enroll').value):null,
    marketing_goal:q('e-goal')?.value||null,status:newStatus,
    assigned_to_name:q('e-assigned')?.value||null,key_message:q('e-msg')?.value||null,
    marketing_notes:q('e-mkt')?.value||null,notes:q('e-notes')?.value||null,
    channels:selChs,...extra,
  }
  const {error}=await SB.from('marketing_requests').update(fields).eq('id',id)
  setBtn('save-edit-btn',false)
  if(error){toast('Error: '+error.message,'err');return}
  if(req?.status!==newStatus)SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:'admin',old_status:req?.status,new_status:newStatus,note:'Edited by admin'}])
  Object.assign(req||{},fields)
  closeModal('modal-edit'); toast('Changes saved ✓'); renderView()
}

      <button class="modal-x" onclick="closeModal('modal-user')" aria-label="Close">×</button>
    </div>
    <div class="modal-bd">
      <div class="field"><label for="eu-name">Full name <span class="req">✱</span></label><input id="eu-name" value="${esc(u.full_name)}"></div>
      <div class="field"><label for="eu-email">Email <span class="req">✱</span></label><input type="email" id="eu-email" value="${esc(u.email)}"><div class="hint">Updates their profile email only. To change their login email, also update it in Supabase → Authentication → Users.</div></div>
      <div class="g2">
        <div class="field"><label>Role</label><select id="eu-role">${['staff','marketing','admin'].map(r=>`<option value="${r}"${u.role===r?' selected':''}>${r}</option>`).join('')}</select></div>
        <div class="field"><label>Department</label><select id="eu-dept"><option value="">None</option>${DEPTS.map(d=>`<option${u.department===d?' selected':''}>${d}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('modal-user')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser('${id}')">Save Changes</button>
    </div>
  </div>`
  m.classList.add('open')
  m.addEventListener('click',e=>{if(e.target===m)closeModal('modal-user')})
}

async function createUser(){
  const name=q('u-name')?.value?.trim()
  const email=q('u-email')?.value?.trim()
  const pass=q('u-pass')?.value?.trim()
  const role=q('u-role')?.value||'staff'
  const dept=q('u-dept')?.value
  if(!name){toast('Full name is required','err');return}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Valid email is required','err');return}
  if(!pass){toast('Set a temporary password','err');return}
  setBtn('u-btn',true,'Creating…')
  const {data,error}=await SB.from('mkt_users').insert([{full_name:name,email:email.toLowerCase(),role,department:dept||null,is_active:true}]).select().single()
  setBtn('u-btn',false)
  if(error){
    const msg=error.message.includes('unique')||error.message.includes('duplicate')?'A user with this email already exists.':'Error: '+error.message
    toast(msg,'err')
    const res=q('u-result');if(res)res.innerHTML=`<div class="alert alert-error" style="margin-top:10px"><span class="alert-icon">⚠</span>${esc(msg)}</div>`
    return
  }
  const res=q('u-result')
  if(res)res.innerHTML=`<div class="alert alert-success" style="margin-top:10px"><span class="alert-icon">✅</span><div style="font-size:12px;line-height:1.7"><strong>${esc(name)} created!</strong><br>Now message Claude:<br><code style="background:rgba(0,0,0,.08);padding:2px 6px;border-radius:3px;font-size:11px">Add login for ${esc(email)} password ${esc(pass)}</code></div></div>`
  await loadUsers()
}

async function saveUser(id){
  const name=q('eu-name')?.value?.trim()
  const email=q('eu-email')?.value?.trim()
  const role=q('eu-role')?.value, dept=q('eu-dept')?.value
  if(!name||!email){toast('Name and email required','err');return}
  const {error}=await SB.from('mkt_users').update({full_name:name,email,role,department:dept||null}).eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  const u=USERS_LIST.find(x=>x.id===id);if(u)Object.assign(u,{full_name:name,email,role,department:dept||null})
  closeModal('modal-user'); renderView(); toast('User updated ✓')
}

async function toggleUserActive(id,active){
  await SB.from('mkt_users').update({is_active:active}).eq('id',id)
  const u=USERS_LIST.find(x=>x.id===id);if(u)u.is_active=active
  renderView(); toast(active?'User activated':'User deactivated')
}

async function deleteUser(id,name){
  if(!confirm('Delete "'+name+'"?\n\nThis removes their profile from the app. Their Supabase login account must be removed separately in Authentication → Users.'))return
  const {error}=await SB.from('mkt_users').delete().eq('id',id)
  if(error){toast('Error: '+error.message,'err');return}
  USERS_LIST=USERS_LIST.filter(u=>u.id!==id)
  renderView(); toast('User deleted')
}

// ── DETAIL ACTIONS ─────────────────────────────────────────────────
async function openDetail(id){
  SEL_ID=id; DETAIL_TAB='brief'
  if(!getReq(id)){
    const {data}=await SB.from('marketing_requests').select('*').eq('id',id).single()
    if(data)ALL_REQS.push(data)
  }
  await loadDetail(id)
  VIEW='detail'; showApp()
}
function backFromDetail(){SEL_ID=null;navTo('requests')}

function switchTab(t){
  DETAIL_TAB=t
  const r=getReq(SEL_ID);if(!r)return
  const mkt=isMkt(), admin=isAdmin()
  const chs=Array.isArray(r.channels)?r.channels:[]
  const hi=Array.isArray(r.highlights)?r.highlights:typeof r.highlights==='string'?r.highlights.split('\n').filter(Boolean):[]
  const tc=q('tab-content')
  if(tc)tc.innerHTML=renderTabContent(r,mkt,admin,chs,hi,r.priority_score||0)
  qsa('.tab-btn').forEach(btn=>btn.classList.remove('active'))
  const tabMap={brief:'Brief',messages:'Messages',deliverables:'Deliverables',timeline:'History'}
  qsa('.tab-btn').forEach(btn=>{if(btn.textContent.includes(tabMap[t])){btn.classList.add('active');btn.setAttribute('aria-selected','true')}else btn.setAttribute('aria-selected','false')})
}

async function detailChangeStatus(id,status){
  await changeStatus(id,status)
  const r=getReq(id)
  if(r){await loadDetail(id);VIEW='detail';showApp()}
  toast('→ '+SL[status])
}

async function saveMktNotes(id){
  const notes=q('mkt-notes')?.value||''
  await SB.from('marketing_requests').update({marketing_notes:notes}).eq('id',id)
  const r=getReq(id);if(r)r.marketing_notes=notes
  toast('Notes saved')
}

async function saveAssigned(id){
  const name=q('assign-input')?.value?.trim()||null
  await SB.from('marketing_requests').update({assigned_to_name:name}).eq('id',id)
  const r=getReq(id);if(r)r.assigned_to_name=name
  toast(name?'Assigned to '+name:'Assignment cleared')
}

async function toggleClar(id,checked){
  await SB.from('marketing_requests').update({clarification_needed:checked}).eq('id',id)
  const r=getReq(id);if(r)r.clarification_needed=checked
  await loadDetail(id); VIEW='detail'; showApp()
}

async function saveClarNote(id,note){
  await SB.from('marketing_requests').update({clarification_note:note}).eq('id',id)
  const r=getReq(id);if(r)r.clarification_note=note
}

async function sendMsg(id){
  const body=q('comment-input')?.value?.trim()
  const internal=q('internal-chk')?.checked||false
  if(!body){toast('Please write a message','err');return}
  const {error}=await SB.from('mkt_comments').insert([{request_id:id,author_name:USER.full_name,author_role:USER.role,body,is_internal:internal}])
  if(error){toast('Error: '+error.message,'err');return}
  await loadDetail(id); switchTab('messages'); toast('Message sent')
}

async function toggleDeliv(id,checked){
  await SB.from('mkt_deliverables').update({completed:checked,completed_at:checked?new Date().toISOString():null,completed_by:checked?USER.full_name:null}).eq('id',id)
  await loadDetail(SEL_ID); switchTab('deliverables')
}

async function addDeliv(reqId){
  const label=q('new-deliv')?.value?.trim(), date=q('new-deliv-date')?.value
  if(!label){toast('Enter a deliverable','err');return}
  await SB.from('mkt_deliverables').insert([{request_id:reqId,label,due_date:date||null,sort_order:DELIVS.length}])
  await loadDetail(reqId); switchTab('deliverables')
}

function updateStars(){
  qsa('#stars button').forEach((btn,i)=>{btn.style.opacity=FB_RATING>=i+1?1:.25;btn.setAttribute('aria-pressed',FB_RATING>=i+1)})
}

async function submitFeedback(id){
  if(!FB_RATING){toast('Please select a rating','err');return}
  const note=q('fb-note')?.value||''
  await SB.from('marketing_requests').update({feedback_rating:FB_RATING,feedback_note:note}).eq('id',id)
  const r=getReq(id);if(r){r.feedback_rating=FB_RATING;r.feedback_note=note}
  FB_RATING=0; toast('Feedback submitted — thank you! 🙏','ok','⭐'); switchTab('brief')
}

// ── ADMIN ACTIONS ──────────────────────────────────────────────────
async function quickStatus(id,status){
  await changeStatus(id,status,'Admin status change'); renderView()
}
async function reopenReq(id){
  if(!confirm('Reopen this request?'))return
  const r=getReq(id)
  await SB.from('marketing_requests').update({status:'active',completed_at:null}).eq('id',id)
  SB.from('mkt_status_history').insert([{request_id:id,changed_by_name:USER.full_name,changed_by_role:'admin',old_status:r?.status,new_status:'active',note:'Reopened'}])
  if(r){r.status='active';r.completed_at=null}
  toast('Reopened'); renderView()
}
async function archiveReq(id){
  if(!confirm('Archive this request?'))return
  await SB.from('marketing_requests').update({is_archived:true}).eq('id',id)
  const r=getReq(id);if(r)r.is_archived=true
  toast('Archived'); if(VIEW==='detail')backFromDetail(); else renderView()
}
async function unarchiveReq(id){
  await SB.from('marketing_requests').update({is_archived:false}).eq('id',id)
  const r=getReq(id);if(r)r.is_archived=false
  toast('Restored'); renderView()
}
async function deleteReq(id){
  const r=getReq(id)
  if(!confirm('Permanently delete "'+( r?.program_name||'this request')+'"?\n\nThis cannot be undone.'))return
  await SB.from('mkt_comments').delete().eq('request_id',id)
  await SB.from('mkt_deliverables').delete().eq('request_id',id)
  await SB.from('mkt_status_history').delete().eq('request_id',id)
  await SB.from('mkt_notifications').delete().eq('request_id',id)
  await SB.from('marketing_requests').delete().eq('id',id)
  ALL_REQS=ALL_REQS.filter(x=>x.id!==id)
  toast('Deleted permanently')
  if(VIEW==='detail'){SEL_ID=null;navTo('requests')}else renderView()
}
function selToggle(id,checked){if(checked)SELECTED.add(id);else SELECTED.delete(id);renderView()}
function selAll(checked,ids){SELECTED=checked?new Set(ids):new Set();renderView()}
async function bulkStatus(status){
  const ids=[...SELECTED];if(!ids.length)return
  for(const id of ids)await changeStatus(id,status,'Bulk update')
  SELECTED=new Set(); renderView(); toast(ids.length+' requests updated')
}
async function bulkArchive(){
  const ids=[...SELECTED];if(!ids.length||!confirm('Archive '+ids.length+' requests?'))return
  for(const id of ids){await SB.from('marketing_requests').update({is_archived:true}).eq('id',id);const r=getReq(id);if(r)r.is_archived=true}
  SELECTED=new Set(); renderView(); toast(ids.length+' archived')
}
async function bulkDelete(){
  const ids=[...SELECTED];if(!ids.length||!confirm('Permanently delete '+ids.length+' requests?'))return
  for(const id of ids){
    await SB.from('mkt_comments').delete().eq('request_id',id)
    await SB.from('mkt_deliverables').delete().eq('request_id',id)
    await SB.from('mkt_status_history').delete().eq('request_id',id)
    await SB.from('mkt_notifications').delete().eq('request_id',id)
    await SB.from('marketing_requests').delete().eq('id',id)
  }
  ALL_REQS=ALL_REQS.filter(r=>!ids.includes(r.id))
  SELECTED=new Set(); renderView(); toast(ids.length+' deleted permanently')
}

// ── DELEGATED EVENT LISTENER ───────────────────────────────────────
// Handles dynamically rendered elements without nested-quote onclick issues
document.addEventListener('click',function(e){
  const filterBtn=e.target.closest('[data-filter]')
  if(filterBtn){FILTER=filterBtn.dataset.filter;renderView();return}

  const priBtn=e.target.closest('[data-pri-key]')
  if(priBtn&&FORM){
    const key=priBtn.dataset.priKey, val=priBtn.dataset.priVal
    FORM[key]=val
    qsa(`[data-pri-key="${key}"]`).forEach(b=>{b.classList.toggle('on',b.dataset.priVal===val);b.setAttribute('aria-pressed',b.dataset.priVal===val)})
    rerenderScore()
    return
  }

  const goalBtn=e.target.closest('[data-goal]')
  if(goalBtn&&FORM){
    FORM.marketing_goal=goalBtn.dataset.goal
    qsa('[data-goal]').forEach(el=>{el.classList.toggle('on',el.dataset.goal===FORM.marketing_goal);el.setAttribute('aria-checked',el.dataset.goal===FORM.marketing_goal)})
    const ge=q('goal-err');if(ge)ge.style.display='none'
    return
  }

  const chBtn=e.target.closest('[data-ch]')
  if(chBtn&&FORM){toggleCh(chBtn.dataset.ch);return}

  if(e.target.closest('#bulk-clear-btn')){SELECTED=new Set();renderView();return}
  if(e.target.closest('#form-back-btn')){FORM_STEP=1;renderView();return}
  if(e.target.closest('#submit-another-btn')){FORM=blankForm();FORM_STEP=1;VIEW='new';showApp();return}
})

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(q('modal-edit')?.classList.contains('open'))closeModal('modal-edit')
    else if(q('modal-user')?.classList.contains('open'))closeModal('modal-user')
  }
})

// ── BOOT ──────────────────────────────────────────────────────────
boot()
</script>
